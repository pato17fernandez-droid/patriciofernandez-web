<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Supervisor - GuardControl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    h1 { margin-bottom:5px; }
    .card { background:#1e1e1e; padding:20px; border-radius:12px; margin-top:20px; }
    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { padding:12px; border-bottom:1px solid #333; text-align:left; }
    th { color:#00b894; }
    a { color:#74b9ff; }
    .ok { color:#00b894; font-weight:bold; }
  </style>
</head>
<body>

<h1>GuardControl</h1>
<p>Panel Supervisor - Últimas marcas</p>

<div class="card">
  <h2>Registros recientes</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Guardia</th>
        <th>Punto</th>
        <th>Fecha</th>
        <th>GPS</th>
      </tr>
    </thead>
    <tbody id="tabla">
      <tr><td colspan="5">Cargando...</td></tr>
    </tbody>
  </table>
</div>

<script>
async function cargarMarcas() {
  try {
    const res = await fetch("/api/marcas");
    const datos = await res.json();

    const tabla = document.getElementById("tabla");

    if (!datos.length) {
      tabla.innerHTML = `<tr><td colspan="5">No hay registros todavía</td></tr>`;
      return;
    }

    tabla.innerHTML = datos.map(m => {
      const mapa = `https://www.google.com/maps?q=${m.latitud},${m.longitud}`;

      return `
        <tr>
          <td>${m.id}</td>
          <td>${m.guardia}</td>
          <td><span class="ok">${m.punto}</span></td>
          <td>${m.fecha}</td>
          <td><a href="${mapa}" target="_blank">Ver mapa</a></td>
        </tr>
      `;
    }).join("");

  } catch (error) {
    document.getElementById("tabla").innerHTML =
      `<tr><td colspan="5">Error al cargar datos</td></tr>`;
  }
}

cargarMarcas();
setInterval(cargarMarcas, 5000);
</script>

</body>
</html>
