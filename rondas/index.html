<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Rondas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #111; color: white; }
    .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
    button { width: 100%; padding: 15px; font-size: 18px; border: 0; border-radius: 10px; margin-top: 10px; }
    .ok { background: #00b894; color: white; }
    .danger { background: #d63031; color: white; }
    input { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 0; margin-top: 8px; }
  </style>
</head>
<body>

  <h1>Control de Rondas</h1>

  <div class="card">
    <label>Nombre del guardia</label>
    <input id="guardia" placeholder="Ej: Juan Pérez">
    <button class="ok" onclick="guardarGuardia()">Guardar guardia</button>
  </div>

  <div class="card">
    <h2>Acciones</h2>
    <button class="ok" onclick="marcar('INICIO_TURNO')">Iniciar turno</button>
    <button class="danger" onclick="marcar('FIN_TURNO')">Terminar turno</button>
  </div>

  <div class="card">
    <h2>QR de prueba</h2>
    <p>Después crearemos QR reales que abran:</p>
    <p><b>/rondas/marcar.html?punto=PORTON</b></p>
    <a style="color:#74b9ff" href="/rondas/marcar.html?punto=PORTON">Probar Punto Portón</a>
  </div>

<script>
function guardarGuardia() {
  const guardia = document.getElementById("guardia").value.trim();
  if (!guardia) return alert("Escribe el nombre del guardia");
  localStorage.setItem("guardia", guardia);
  alert("Guardia guardado");
}

async function marcar(tipo) {
  const guardia = localStorage.getItem("guardia") || document.getElementById("guardia").value.trim();
  if (!guardia) return alert("Primero escribe y guarda el nombre del guardia");

  navigator.geolocation.getCurrentPosition(async pos => {
    const data = {
      guardia,
      punto: tipo,
      latitud: pos.coords.latitude,
      longitud: pos.coords.longitude
    };

    const res = await fetch("/api/marcas", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });

    const json = await res.json();
    alert(json.ok ? "Marca registrada correctamente" : "Error al registrar");
  }, () => {
    alert("Debes permitir la ubicación GPS");
  });
}
</script>

</body>
</html>
