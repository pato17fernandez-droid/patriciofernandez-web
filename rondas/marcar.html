<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Marcar punto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #111; color: white; text-align: center; }
    .card { background: #1e1e1e; padding: 25px; border-radius: 12px; }
    button { width: 100%; padding: 15px; font-size: 18px; border: 0; border-radius: 10px; background: #00b894; color: white; }
  </style>
</head>
<body>

<div class="card">
  <h1>Registrar Punto</h1>
  <p id="punto"></p>
  <button onclick="registrar()">Registrar ubicación</button>
  <p id="estado"></p>
</div>

<script>
const params = new URLSearchParams(location.search);
const punto = params.get("punto") || "SIN_PUNTO";
document.getElementById("punto").innerText = "Punto: " + punto;

async function registrar() {
  const guardia = localStorage.getItem("guardia") || prompt("Nombre del guardia:");
  if (!guardia) return alert("Falta nombre del guardia");

  document.getElementById("estado").innerText = "Obteniendo GPS...";

  navigator.geolocation.getCurrentPosition(async pos => {
    const data = {
      guardia,
      punto,
      latitud: pos.coords.latitude,
      longitud: pos.coords.longitude
    };

    const res = await fetch("/api/marcas", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });

    const json = await res.json();

    if (json.ok) {
      document.getElementById("estado").innerHTML =
        "✅ Punto registrado<br>Hora: " + new Date().toLocaleString();
    } else {
      document.getElementById("estado").innerText = "Error al registrar";
    }
  }, () => {
    document.getElementById("estado").innerText = "Debes permitir ubicación GPS";
  });
}
</script>

</body>
</html>
