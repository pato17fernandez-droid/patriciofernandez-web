<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios - GuardControl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">Guard<span>Control</span></div>
    <div class="subtitle">Control inteligente de rondas</div>

    <nav class="menu">
  <a href="/guardcontrol/">Dashboard</a>
  <a class="active" href="/guardcontrol/usuarios.html"">Usuarios</a>
  <a href="/guardcontrol/empresas.html">Empresas</a>
  <a href="/guardcontrol/instalaciones.html">Instalaciones</a>
  <a href="/guardcontrol/puntos.html">Puntos QR</a>
  <a href="/guardcontrol/reportes.html">Reportes</a>
   </nav>
  </aside>

  <main class="content">
    <div class="topbar">
      <h1>Usuarios</h1>
      <div>
  <div class="user">Cargando...</div>
  <button onclick="cerrarSesion()" style="margin-top:8px;">Cerrar sesión</button>
  </div>
    </div>

    <section class="panel">
      <h2>Nuevo usuario</h2>

      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:25px;">
        <input id="nombre" placeholder="Nombre completo">
        <input id="usuario" placeholder="Usuario">
        <input id="password" placeholder="Contraseña">
        <select id="rol">
          <option value="Administrador">Administrador</option>
          <option value="Supervisor">Supervisor</option>
          <option value="Guardia">Guardia</option>
        </select>
        <button onclick="crearUsuario()">Guardar usuario</button>
      </div>

      <h2>Usuarios registrados</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Usuario</th>
            <th>Rol</th>
          </tr>
        </thead>
        <tbody id="tablaUsuarios">
          <tr><td colspan="4">Cargando usuarios...</td></tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/usuarios.js"></script>
</body>
</html>
