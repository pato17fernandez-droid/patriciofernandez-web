<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reportes - GuardControl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">Guard<span>Control</span></div>
    <div class="subtitle">Control inteligente de rondas</div>
    <nav class="menu" id="menu"></nav>
  </aside>

  <main class="content">
    <div class="topbar">
      <h1>Reportes de Rondas</h1>
      <div>
        <div class="user">Cargando...</div>
        <button onclick="cerrarSesion()" style="margin-top:8px;">Cerrar sesión</button>
      </div>
    </div>

    <section class="cards">
      <div class="card">
        <div class="card-title">Rondas mostradas</div>
        <div class="card-number" id="totalRondas">0</div>
      </div>

      <div class="card">
        <div class="card-title">Última ronda</div>
        <div class="card-number" id="ultimaRonda">-</div>
      </div>

      <div class="card">
        <div class="card-title">Última actualización</div>
        <div class="card-number" id="ultimaActualizacion">-</div>
      </div>
    </section>

    <section class="panel">
      <h2>Filtros</h2>

      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:25px;">
        <input id="filtroTexto" placeholder="Buscar guardia, empresa, instalación o punto">
        <input id="filtroFecha" type="date">
        <button onclick="aplicarFiltros()">Aplicar filtros</button>
        <button onclick="limpiarFiltros()">Limpiar filtros</button>
      </div>

      <h2>Últimas rondas registradas</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Guardia</th>
            <th>Empresa</th>
            <th>Instalación</th>
            <th>Punto</th>
            <th>Fecha</th>
            <th>GPS</th>
          </tr>
        </thead>
        <tbody id="tablaRondas">
          <tr><td colspan="7">Cargando rondas...</td></tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/menu.js"></script>
<script>
  protegerPagina(["Administrador", "Supervisor"]);
  cargarMenu("reportes");
</script>
<script src="js/reportes.js"></script>

</body>
</html>
