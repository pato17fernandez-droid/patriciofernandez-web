<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reportes - GuardControl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">Guard<span>Control</span></div>
    <div class="subtitle">Control inteligente de rondas</div>

    <nav class="menu">
      <a href="/guardcontrol/">Dashboard</a>
      <a href="/guardcontrol/usuarios.html">Usuarios</a>
      <a href="/guardcontrol/empresas.html">Empresas</a>
      <a href="/guardcontrol/instalaciones.html">Instalaciones</a>
      <a href="/guardcontrol/puntos.html">Puntos QR</a>
      <a class="active" href="/guardcontrol/reportes.html">Reportes</a>
    </nav>
  </aside>

  <main class="content">
    <div class="topbar">
      <h1>Reportes de Rondas</h1>
      <div>
        <div class="user">Cargando...</div>
        <button onclick="cerrarSesion()" style="margin-top:8px;">Cerrar sesión</button>
      </div>
    </div>

    <section class="panel">
      <h2>Últimas rondas registradas</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Guardia</th>
            <th>Empresa</th>
            <th>Instalación</th>
            <th>Punto</th>
            <th>Fecha</th>
            <th>GPS</th>
          </tr>
        </thead>
        <tbody id="tablaRondas">
          <tr><td colspan="7">Cargando rondas...</td></tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/reportes.js"></script>
</body>
</html>
