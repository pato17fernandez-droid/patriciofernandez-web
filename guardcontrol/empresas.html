<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Empresas - GuardControl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">Guard<span>Control</span></div>
    <div class="subtitle">Control inteligente de rondas</div>

    <nav class="menu">
  <a href="/guardcontrol/">Dashboard</a>
  <a href="/guardcontrol/usuarios.html">Usuarios</a>
  <a class="active" href="/guardcontrol/empresas.html">Empresas</a>
  <a href="/guardcontrol/instalaciones.html">Instalaciones</a>
  <a href="/guardcontrol/puntos.html">Puntos QR</a>
  <a href="/guardcontrol/reportes.html">Reportes</a>
  </nav>
  </aside>

  <main class="content">
    <div class="topbar">
      <h1>Empresas</h1>
      <div>
  <div class="user">Cargando...</div>
  <button onclick="cerrarSesion()" style="margin-top:8px;">Cerrar sesión</button>
      </div>
    </div>

    <section class="panel">
      <h2>Nueva empresa</h2>

      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:25px;">
        <input id="nombre" placeholder="Nombre empresa">
        <input id="rut" placeholder="RUT">
        <input id="correo" placeholder="Correo">
        <input id="telefono" placeholder="Teléfono">
        <button onclick="crearEmpresa()">Guardar empresa</button>
      </div>

      <h2>Empresas registradas</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>RUT</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tablaEmpresas">
          <tr><td colspan="6">Cargando empresas...</td></tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/empresas.js"></script>
</body>
</html>
