<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Ronda - GuardControl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
    }

    .mark-box {
      width:100%;
      max-width:480px;
      background:#151923;
      border:1px solid #252b38;
      border-radius:18px;
      padding:28px;
      text-align:center;
    }

    .mark-box h1 {
      margin-top:0;
    }

    .info {
      margin:12px 0;
      color:#d1d5db;
    }

    .big {
      font-size:22px;
      font-weight:bold;
      color:#00b894;
    }

    button {
      width:100%;
      margin-top:18px;
    }
  </style>
</head>
<body>

<div class="mark-box">
  <h1>Guard<span style="color:#00b894;">Control</span></h1>
  <p>Registro de ronda</p>

  <div class="info">Guardia:</div>
  <div class="big" id="guardia">Cargando...</div>

  <div class="info">Código QR:</div>
  <div class="big" id="codigo">-</div>

  <button onclick="registrarRonda()">Registrar ronda</button>

  <p id="estado"></p>
</div>

<script src="js/auth.js"></script>
<script>
  protegerPagina(["Guardia"]);
</script>
<script src="js/marcar.js"></script>
</body>
</html>
