<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - GuardControl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    .login-box {
      width:100%;
      max-width:420px;
      background:#151923;
      border:1px solid #252b38;
      border-radius:18px;
      padding:30px;
    }

    .login-box h1 {
      margin-top:0;
      text-align:center;
    }

    .login-box input,
    .login-box button {
      width:100%;
      margin-top:12px;
    }

    .login-sub {
      text-align:center;
      color:#9ca3af;
      margin-bottom:25px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h1>Guard<span style="color:#00b894;">Control</span></h1>
  <div class="login-sub">Sistema de Control de Rondas</div>

  <input id="usuario" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>
</div>

<script src="js/login.js"></script>
</body>
</html>
