<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b1120">
  <title>Iniciar sesión | GuardControl</title>
  <link rel="stylesheet" href="/guardcontrol/css/style.css">
  <style>
    body { display:grid; place-items:center; min-height:100vh; padding:20px; }
    .login-shell { width:100%; max-width:440px; }
    .login-card { padding:32px; border:1px solid var(--border,#263449); border-radius:22px; background:rgba(21,31,50,.96); box-shadow:0 22px 60px rgba(0,0,0,.34); }
    .login-brand { margin-bottom:26px; text-align:center; }
    .login-logo { margin:0; font-size:34px; font-weight:900; letter-spacing:-1px; }
    .login-logo span { color:var(--primary,#10b981); }
    .login-subtitle { margin:8px 0 0; color:var(--muted,#94a3b8); line-height:1.5; }
    .login-form { display:grid; gap:15px; }
    .login-field { display:grid; gap:7px; }
    .login-field label { color:#dbe5f3; font-size:13px; font-weight:800; }
    .login-field input { width:100%; }
    .login-button { width:100%; margin-top:5px; min-height:48px; }
    .login-message { min-height:24px; margin:2px 0 0; text-align:center; font-size:14px; font-weight:700; }
    .login-message.info { color:var(--info,#38bdf8); }
    .login-message.ok { color:var(--primary,#10b981); }
    .login-message.error { color:var(--danger,#ef4444); }
    .login-help { margin:22px 0 0; color:var(--muted,#94a3b8); font-size:12px; line-height:1.5; text-align:center; }
    @media (max-width:520px){ .login-card{padding:24px 20px;} }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-card" aria-labelledby="tituloLogin">
      <div class="login-brand">
        <h1 class="login-logo" id="tituloLogin">Guard<span>Control</span></h1>
        <p class="login-subtitle">Sistema de control inteligente de rondas</p>
      </div>
      <form class="login-form" id="loginForm" novalidate>
        <div class="login-field">
          <label for="usuario">Usuario</label>
          <input id="usuario" name="usuario" type="text" autocomplete="username" placeholder="Ingresa tu usuario" required>
        </div>
        <div class="login-field">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Ingresa tu contraseña" required>
        </div>
        <button class="login-button" id="btnIngresar" type="submit">Iniciar sesión</button>
        <p class="login-message" id="mensaje" role="status" aria-live="polite"></p>
      </form>
      <p class="login-help">Si llegaste aquí después de escanear un QR, GuardControl te devolverá automáticamente al punto de control después de iniciar sesión.</p>
    </section>
  </main>
  <script src="/guardcontrol/js/login.js"></script>
</body>
</html>
