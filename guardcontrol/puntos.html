<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Puntos QR - GuardControl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">Guard<span>Control</span></div>
    <div class="subtitle">Control inteligente de rondas</div>
    <nav class="menu">
      <a href="/guardcontrol/">Dashboard</a>
      <a href="/guardcontrol/usuarios.html">Usuarios</a>
      <a href="/guardcontrol/empresas.html">Empresas</a>
      <a href="/guardcontrol/instalaciones.html">Instalaciones</a>
      <a class="active" href="/guardcontrol/puntos.html">Puntos QR</a>
      <a href="#">Reportes</a>
    </nav>
  </aside>

  <main class="content">
    <div class="topbar">
      <h1>Puntos de Control</h1>
      <div>
  <div class="user">Cargando...</div>
  <button onclick="cerrarSesion()" style="margin-top:8px;">Cerrar sesión</button>
  </div>
    </div>

    <section class="panel">
      <h2>Nuevo punto</h2>

      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:25px;">
        <select id="instalacion_id"></select>
        <input id="nombre" placeholder="Nombre del punto">
        <input id="latitud" placeholder="Latitud opcional">
        <input id="longitud" placeholder="Longitud opcional">
        <button onclick="crearPunto()">Guardar punto</button>
      </div>

      <h2>Puntos registrados</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Empresa</th>
            <th>Instalación</th>
            <th>Punto</th>
            <th>Código QR</th>
            <th>QR</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tablaPuntos">
          <tr><td colspan="7">Cargando puntos...</td></tr>
        </tbody>
      </table>
    </section>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/puntos.js"></script>
</body>
</html>
